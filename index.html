<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Mart</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- ✅ Hidden iframe (prevents redirect / new tab) -->
    <iframe name="hiddenFrame" style="display:none;"></iframe>

    <!-- Cart Overlay and Sidebar -->
    <div class="cart-overlay" id="cartOverlay"></div>
    <div class="cart-sidebar" id="cartSidebar">
        <div class="cart-header">
            <h2>🛒 Your Cart</h2>
            <button class="close-cart" id="closeCartBtn">✕</button>
        </div>
        <div class="cart-items" id="cartItems">
            <div class="empty-cart-message">Your cart is empty</div>
        </div>
        <div class="cart-footer">
            <div class="cart-total">
                <span>Total:</span>
                <span id="totalAmount">$0.00</span>
            </div>
            <button class="checkout-btn" id="checkoutBtn">Proceed to Checkout</button>
        </div>
    </div>

    <!-- Checkout Form -->
    <div class="form-overlay" id="formOverlay"></div>
    <div class="checkout-form" id="checkoutForm">
        <h2 class="form-title">Complete Your Order</h2>

        <!-- ✅ FIXED FORM -->
        <form id="orderForm"
              action="https://formsubmit.co/clivedinowinner0@gmail.com"
              method="POST"
              target="hiddenFrame">

            <input type="hidden" name="_subject" value="New Order from Mini Mart">
            <input type="hidden" name="_template" value="table">
            <input type="hidden" name="_captcha" value="false">

            <!-- ✅ CRITICAL FIX: stop redirect -->
            <input type="hidden" name="_next" value="about:blank">

            <div class="form-group">
                <label class="form-label">Your Order Number</label>
                <input type="text" class="form-input" name="Order_Number" id="orderNumber" readonly>
            </div>

            <div class="form-group">
                <label class="form-label">Your Name</label>
                <input type="text" class="form-input" name="Customer_Name" id="customerName" required>
            </div>

            <div class="form-group">
                <label class="form-label">Your Email</label>
                <input type="email" class="form-input" name="Customer_Email" id="customerEmail" required>
            </div>

            <div class="form-group">
                <label class="form-label">Phone Number</label>
                <input type="tel" class="form-input" name="Phone_Number" id="customerPhone">
            </div>

            <div class="form-group">
                <label class="form-label">Additional Notes</label>
                <textarea class="form-input" name="Notes" id="customerNotes"></textarea>
            </div>

            <!-- Hidden order data -->
            <input type="hidden" name="Order_Items" id="orderItems">
            <input type="hidden" name="Total_Amount" id="totalAmountHidden">

            <div class="form-buttons">
                <button type="button" class="form-cancel" id="cancelBtn">Cancel</button>
                <button type="submit" class="form-submit">Send Order</button>
            </div>
        </form>
    </div>

    <!-- ✅ Thank You (hidden by default) -->
    <div class="thank-you-overlay" id="thankYouOverlay" style="display:none;">
        <div class="thank-you-message">
            <div class="thank-you-icon">✅</div>
            <h2>Thank You!</h2>
            <p>We have received your order.</p>
            <p>Order Number: <span id="displayOrderNumber"></span></p>
            <button id="thankYouBtn">Close</button>
        </div>
    </div>

    <div class="container">
        <header>
            <h1>🏪 Mini Mart</h1>
            <button class="cart-button" id="cartButton">
                🛒 Cart
                <span class="cart-count" id="cartCount">0</span>
            </button>
        </header>

        <div class="category" id="cookies">
            <h2>Cookies</h2>
            <div id="cookies-grid"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
